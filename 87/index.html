<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天使鵝鵝嘴砲聊天室</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #playerNameTag {
            position: absolute;
            z-index: 3; 
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            pointer-events: none;
            display: none; 
            transform: translateX(-50%); 
            white-space: nowrap;
        }
        #playerHpBarBg {
            position: absolute;
            z-index: 3;
            width: 80px;
            height: 10px;
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid #222;
            border-radius: 5px;
            display: none;
            transform: translateX(-50%);
            pointer-events: none;
            overflow: hidden;
        }
        #playerHpBar {
            width: 100%;
            height: 100%;
            background-color: #e74c3c;
            transition: width 0.1s linear;
        }
        #playerSprite {
            position: absolute;
            z-index: 2;
            pointer-events: none;
            will-change: transform;
            display: none;
            height: 180px; 
        }
        #damageOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: transparent;
            pointer-events: none;
            z-index: 25;
            transition: background-color 0.1s;
        }

        /* 左側 UI 區塊 */
        #ui {
            position: absolute;
            top: 30px; 
            left: 15px;
            pointer-events: none;
            text-shadow: 2px 2px 2px #000;
            z-index: 10;
            display: none;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #ui h2, #ui h3, #ui p {
            margin: 5px 0;
            font-weight: bold;
        }
        #ui h2 {
            color: #e74c3c;
            font-size: 24px;
        }
        #ui h3 {
            color: #ecf0f1;
            font-size: 20px;
        }
        #levelText {
            font-size: 28px;
            color: #f1c40f;
            margin-bottom: 10px !important;
            border-bottom: 2px solid #f1c40f;
            padding-bottom: 5px;
        }
        #skillList {
            margin-top: 15px;
            font-size: 15px;
            color: #3498db;
        }

        #xpBarContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 10;
            display: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        #xpBar {
            width: 0%;
            height: 100%;
            background-color: #f1c40f; 
            transition: width 0.1s;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }
        
        #startScreenWrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-height: 95vh;
            padding: 20px 0;
        }

        #startScreen h1 {
            font-size: 54px;
            margin-bottom: 20px;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }
        .input-group {
            margin-bottom: 30px;
            text-align: center;
        }
        .input-group input {
            padding: 12px;
            font-size: 20px;
            border-radius: 8px;
            border: 2px solid #34495e;
            outline: none;
            text-align: center;
            width: 300px;
            background: #2c3e50;
            color: white;
        }
        .input-group input::placeholder {
            color: #95a5a6;
        }
        .char-selection {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .char-card {
            background: #2c3e50;
            border: 3px solid #34495e;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            width: 200px;
        }
        .char-card:hover {
            transform: scale(1.05);
            border-color: #3498db;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.5);
        }
        .char-card img {
            width: 100px;
            height: auto;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .char-card h3 {
            margin: 0;
            color: #fff;
            font-size: 20px;
        }

        /* 實況區塊樣式 */
        #liveStreamsSection {
            margin-top: 30px;
            text-align: center;
            width: 100%;
        }
        #liveStreamsSection h2 {
            color: #3498db;
            text-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
            margin-bottom: 15px;
        }
        #liveStreamsContainer {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            max-width: 90vw;
            padding: 10px;
            justify-content: center;
            min-height: 150px;
        }
        .stream-card {
            background: rgba(44, 62, 80, 0.9);
            border: 2px solid #3498db;
            border-radius: 8px;
            padding: 10px;
            min-width: 200px;
            max-width: 250px;
            text-align: center;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .stream-card h4 {
            margin: 0 0 5px 0;
            color: #f1c40f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stream-card p {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #ecf0f1;
        }
        .stream-card img {
            width: 100%;
            border-radius: 5px;
            border: 1px solid #111;
            object-fit: contain;
        }
        /* 自訂捲軸 */
        #liveStreamsContainer::-webkit-scrollbar { height: 8px; }
        #liveStreamsContainer::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 10px; }
        #liveStreamsContainer::-webkit-scrollbar-thumb { background: #3498db; border-radius: 10px; }

        #levelUpScreen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 15px;
            border: 3px solid #f1c40f;
            z-index: 40;
            text-align: center;
            width: 80%;
            max-width: 450px;
            max-height: 85vh; 
            overflow-y: auto; 
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.6);
        }
        #levelUpScreen::-webkit-scrollbar {
            width: 8px;
        }
        #levelUpScreen::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2); 
            border-radius: 10px;
        }
        #levelUpScreen::-webkit-scrollbar-thumb {
            background: #f1c40f; 
            border-radius: 10px;
        }
        #levelUpScreen h1 {
            color: #f1c40f;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 2px 2px 2px #000;
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.95);
            padding-bottom: 10px;
            z-index: 2;
        }
        .skill-btn {
            display: block;
            width: 100%;
            margin: 10px 0; 
            padding: 10px; 
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: #2c3e50;
            color: #ecf0f1;
            border: 2px solid #34495e;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .skill-btn:hover {
            background: #2980b9;
            border-color: #3498db;
            transform: scale(1.02);
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.4);
        }

        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.95);
            padding: 50px;
            border-radius: 15px;
            border: 3px solid #e74c3c;
            z-index: 60; 
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }
        #gameOver h1 {
            color: #e74c3c;
            margin-top: 0;
            font-size: 48px;
            text-shadow: 2px 2px 0px #000;
        }
        #finalStats {
            font-size: 22px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        button.restart-btn {
            padding: 12px 30px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background 0.2s, transform 0.2s;
        }
        button.restart-btn:hover {
            background: #27ae60;
            transform: scale(1.05);
        }

        /* 手機虛擬搖桿樣式 */
        #joystickZone {
            position: absolute;
            bottom: 50px;
            left: 50px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            z-index: 30;
            display: none; /* 預設隱藏，偵測到觸控裝置才會開啟 */
            touch-action: none;
        }
        #joystickStick {
            position: absolute;
            top: 35px;
            left: 35px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
        }

        /* ================== 排行榜 UI 樣式 ================== */
        #miniLeaderboard {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            z-index: 60; 
            color: #fff;
            width: 220px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        #miniLeaderboard:hover { background: rgba(0, 0, 0, 0.9); }
        #miniLeaderboard h3 { margin: 0 0 10px 0; color: #f1c40f; text-align: center; font-size: 18px; }
        .lb-entry { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
        .lb-entry .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
        
        #fullLeaderboardModal {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #fullLeaderboardContent {
            background: #2c3e50;
            border: 3px solid #f1c40f;
            border-radius: 15px;
            width: 90%; max-width: 500px;
            max-height: 80vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.4);
        }
        #fullLeaderboardContent h2 { color: #f1c40f; text-align: center; margin-top: 0; text-shadow: 2px 2px #000; }
        #lbSearch { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 2px solid #34495e; box-sizing: border-box; background: #1a252f; color: white; outline: none; font-size: 16px; }
        #lbSearch::placeholder { color: #95a5a6; }
        #lbList { flex-grow: 1; overflow-y: auto; padding-right: 10px; }
        #lbList::-webkit-scrollbar { width: 8px; }
        #lbList::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 10px; }
        #lbList::-webkit-scrollbar-thumb { background: #f1c40f; border-radius: 10px; }
        .lb-full-entry { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #34495e; font-size: 18px; align-items: center;}
        .lb-full-entry .rank { font-weight: bold; color: #e74c3c; width: 40px; }
        .lb-full-entry .name { flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 10px; }
        .lb-full-entry .time { color: #2ecc71; font-weight: bold; }
        .close-btn { margin-top: 20px; padding: 12px; background: #e74c3c; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; text-align: center; transition: 0.2s; }
        .close-btn:hover { background: #c0392b; transform: scale(1.02); }

        /* ================== 手機等比例縮小選單設定 ================== */
        @media screen and (max-width: 768px) {
            #ui { transform: scale(0.75); transform-origin: top left; }
            #miniLeaderboard { transform: scale(0.75); transform-origin: top right; }
            #startScreenWrapper { transform: scale(0.75); }
            #levelUpScreen { transform: translate(-50%, -50%) scale(0.85); width: 90%; }
            #gameOver { transform: translate(-50%, -50%) scale(0.8); }
            #fullLeaderboardContent { transform: scale(0.85); }
        }

        @media screen and (max-width: 480px) {
            #ui { transform: scale(0.6); }
            #miniLeaderboard { transform: scale(0.65); }
            #startScreenWrapper { transform: scale(0.65); }
            #levelUpScreen { transform: translate(-50%, -50%) scale(0.75); }
            #gameOver { transform: translate(-50%, -50%) scale(0.7); }
            #fullLeaderboardContent { transform: scale(0.75); }
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="miniLeaderboard" onclick="window.openFullLeaderboard()">
            <h3>🏆 存活排行榜 Top 10</h3>
            <div id="miniLbList">連線中...</div>
            <div style="font-size: 12px; text-align: center; margin-top: 10px; color: #bdc3c7;">點擊查看完整名單 / 搜尋</div>
        </div>

        <div id="fullLeaderboardModal">
            <div id="fullLeaderboardContent">
                <h2>🏆 鵝鵝高手排行榜</h2>
                <input type="text" id="lbSearch" placeholder="輸入玩家名稱搜尋..." onkeyup="window.filterLeaderboard()">
                <div id="lbList"></div>
                <button class="close-btn" onclick="window.closeFullLeaderboard()">關閉排行榜</button>
            </div>
        </div>
        
        <div id="startScreen">
            <div id="startScreenWrapper">
                <h1>開始嘴砲時間</h1>
                <div class="input-group">
                    <input type="text" id="playerNameInput" placeholder="請輸入玩家名稱 (可留空)" autocomplete="off">
                </div>
                <h2>請選擇角色</h2>
                <div class="char-selection">
                    <div class="char-card" onclick="startGame()">
                        <img src="https://truth.bahamut.com.tw/s01/202606/43564bf4cf60b9503351e352c70275c1.GIF" alt="天使鵝鵝">
                        <h3>角色1<br>天使鵝鵝</h3>
                    </div>
                </div>

                <div id="liveStreamsSection">
                    <h2>📺 鵝鵝玩家實況</h2>
                    <div id="liveStreamsContainer">
                        <p style="color: #95a5a6;">連線中...</p>
                    </div>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
        
        <div id="damageOverlay"></div>

        <div id="playerNameTag">玩家名稱</div>
        <div id="playerHpBarBg"><div id="playerHpBar"></div></div>

        <img id="playerSprite" src="https://truth.bahamut.com.tw/s01/202606/43564bf4cf60b9503351e352c70275c1.GIF" alt="Player">
        
        <div id="xpBarContainer"><div id="xpBar"></div></div>
        
        <div id="ui">
            <h3 id="levelText">LV: 1</h3>
            <h2 id="hpText">HP: 100 / 100</h2>
            <h3 id="timeText">時間: 00:00</h3>
            <div id="skillList">
                <p id="skill0Text">▶ 嘴完人就跑 : LV 0</p>
                <p id="skill1Text">▶ 增加言語傷害 : LV 0</p>
                <p id="skill2Text">▶ 獲得嘴人成就感 : LV 0</p>
                <p id="skill3Text">▶ 多開戰場 : LV 0</p>
                <p id="skill4Text">▶ 五速嘴 : LV 0</p>
                <p id="skill5Text">▶ 打臉笑死 : LV 0</p>
                <p id="skill6Text">▶ 一言不和開地圖炮 : LV 0</p>
            </div>
        </div>

        <div id="joystickZone">
            <div id="joystickStick"></div>
        </div>

        <div id="levelUpScreen">
            <h1>升級！選擇一項技能</h1>
            <div id="skillOptionsContainer"></div>
        </div>

        <div id="gameOver">
            <h1>遊戲結束</h1>
            <p id="finalStats"></p>
            <button class="restart-btn" onclick="location.reload()">重新開始</button>
        </div>
    </div>

    <script type="module">
        // 增加 set, remove, onDisconnect 來管理實況資料的增刪
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, query as dbQuery, orderByChild, set, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaq5Y89srrIozUZY7sUJALvAamIZsxyuo",
            authDomain: "mmorpg-a836b.firebaseapp.com",
            databaseURL: "https://mmorpg-a836b.firebaseio.com",
            projectId: "mmorpg-a836b",
            storageBucket: "mmorpg-a836b.appspot.com",
            messagingSenderId: "995630256799",
            appId: "1:995630256799:web:913fbb7303b58efaff08aa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // 將實況用到的 Firebase 方法綁定到 window 讓另一個 Script 可以呼叫
        window.firebaseDb = db;
        window.firebaseRef = ref;
        window.firebasePush = push;
        window.firebaseSet = set;
        window.firebaseRemove = remove;
        window.firebaseOnDisconnect = onDisconnect;

        signInAnonymously(auth).then(() => {
            console.log("Firebase 遊客登入成功！");
        }).catch((error) => {
            console.error("Firebase 登入失敗:", error);
        });

        window.allScores = [];
        window.saveToLeaderboard = function(playerName, surviveTime) {
            const leaderboardRef = ref(db, 'leaderboard');
            push(leaderboardRef, {
                name: playerName,
                time: surviveTime,
                timestamp: Date.now()
            });
        };

        const leaderboardRef = ref(db, 'leaderboard');
        const topScoresQuery = dbQuery(leaderboardRef, orderByChild('time'));
        
        onValue(topScoresQuery, (snapshot) => {
            let scores = [];
            snapshot.forEach((childSnapshot) => {
                scores.push(childSnapshot.val());
            });
            scores.reverse();
            window.allScores = scores.map((s, index) => ({...s, rank: index + 1}));
            window.updateLeaderboardUI();
        });

        // 監聽並渲染目前實況中的玩家
        const liveStreamsRef = ref(db, 'livestreams');
        onValue(liveStreamsRef, (snapshot) => {
            const container = document.getElementById('liveStreamsContainer');
            if (!container) return;
            
            let html = '';
            if (!snapshot.exists()) {
                container.innerHTML = '<p style="color: #95a5a6;">目前沒有玩家在實況中喔！</p>';
                return;
            }

            snapshot.forEach((child) => {
                const data = child.val();
                html += `
                    <div class="stream-card">
                        <h4>${data.name}</h4>
                        <p>存活時間: ${data.time}</p>
                        <img src="${data.image}" alt="Live Stream">
                    </div>
                `;
            });
            container.innerHTML = html;
        });
    </script>
    <script>
        function formatTimeHelper(secs) {
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = Math.floor(secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        window.updateLeaderboardUI = function() {
            const miniList = document.getElementById('miniLbList');
            miniList.innerHTML = '';
            if (window.allScores.length === 0) {
                miniList.innerHTML = '<div style="text-align:center;">尚無紀錄</div>';
            } else {
                window.allScores.slice(0, 10).forEach(s => {
                    const div = document.createElement('div');
                    div.className = 'lb-entry';
                    div.innerHTML = `<span class="name">#${s.rank} ${s.name}</span><span>${formatTimeHelper(s.time)}</span>`;
                    miniList.appendChild(div);
                });
            }
            window.filterLeaderboard(); 
        };

        window.renderFullList = function(scoresToRender) {
            const list = document.getElementById('lbList');
            list.innerHTML = '';
            if(scoresToRender.length === 0) {
                list.innerHTML = '<div style="color:white; text-align:center;">找不到玩家</div>';
                return;
            }
            scoresToRender.forEach(s => {
                const div = document.createElement('div');
                div.className = 'lb-full-entry';
                div.innerHTML = `<span class="rank">#${s.rank}</span><span class="name">${s.name}</span><span class="time">${formatTimeHelper(s.time)}</span>`;
                list.appendChild(div);
            });
        };

        window.filterLeaderboard = function() {
            const term = document.getElementById('lbSearch').value.toLowerCase();
            const filtered = window.allScores.filter(s => s.name.toLowerCase().includes(term));
            window.renderFullList(filtered);
        };

        window.openFullLeaderboard = function() {
            document.getElementById('fullLeaderboardModal').style.display = 'flex';
            window.filterLeaderboard(); 
        };

        window.closeFullLeaderboard = function() {
            document.getElementById('fullLeaderboardModal').style.display = 'none';
        };

        function handleJoystickMove(touch) {
            const centerX = joystickRect.left + joystickRect.width / 2;
            const centerY = joystickRect.top + joystickRect.height / 2;
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const maxDist = joystickRect.width / 2;

            if (dist > maxDist) {
                dx = (dx / dist) * maxDist;
                dy = (dy / dist) * maxDist;
            }

            joystickStick.style.transform = `translate(${dx}px, ${dy}px)`;
            mobileMoveX = dx / maxDist;
            mobileMoveY = dy / maxDist;

        /* * 自製高幀率截圖功能
         * 將主畫布與 UI 使用原生 Canvas 在背景合成，取代 html2canvas 避免造成每 0.5 秒大卡頓
         */
        function captureScreen() {
            const offCanvas = document.createElement('canvas');
            // 縮小解析度以降低 Base64 檔案大小及傳輸負擔
            const scale = 0.25; 
            offCanvas.width = canvas.width * scale;
            offCanvas.height = canvas.height * scale;
            const octx = offCanvas.getContext('2d');
            
            // 1. 將主要的遊戲畫布縮小繪製過來
            octx.drawImage(canvas, 0, 0, offCanvas.width, offCanvas.height);
            
            // 將畫筆縮放，使後續繪製的 UI 能直接使用原始大小的座標系
            octx.scale(scale, scale);

            // 2. 繪製受傷紅色閃爍特效
            if (damageOverlayDom.style.backgroundColor !== 'transparent' && damageOverlayDom.style.backgroundColor !== '') {
                octx.fillStyle = damageOverlayDom.style.backgroundColor;
                octx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 3. 繪製頂部經驗值條
            const xpBarW = canvas.width;
            const xpBarH = 20;
            octx.fillStyle = "rgba(0,0,0,0.6)";
            octx.fillRect(0, 0, xpBarW, xpBarH);
            octx.fillStyle = "#f1c40f";
            octx.fillRect(0, 0, xpBarW * Math.min(1, player.xp / player.xpNeeded), xpBarH);

            // 4. 繪製玩家名稱與血條
            const screenX = player.x - camera.x;
            const screenY = player.y - camera.y;

            octx.textAlign = "center";
            octx.font = "bold 24px 'Segoe UI'";
            octx.fillStyle = "white";
            octx.shadowColor = "black";
            octx.shadowBlur = 4;
            octx.fillText(player.name, screenX, screenY - player.drawH / 2 - 35);
            octx.shadowBlur = 0;

            const hpW = 80, hpH = 10;
            const hpX = screenX - hpW / 2;
            const hpY = screenY - player.drawH / 2 - 5;
            octx.fillStyle = "rgba(0,0,0,0.8)";
            octx.fillRect(hpX, hpY, hpW, hpH);
            octx.fillStyle = "#e74c3c";
            octx.fillRect(hpX, hpY, hpW * (Math.max(0, player.hp) / player.maxHp), hpH);
            octx.strokeStyle = "#222";
            octx.lineWidth = 2;
            octx.strokeRect(hpX, hpY, hpW, hpH);

            // 5. 繪製左上角遊戲資訊 UI
            octx.textAlign = "left";
            octx.fillStyle = "rgba(0,0,0,0.6)";
            octx.fillRect(15, 30, 220, 110);
            octx.fillStyle = "#f1c40f";
            octx.font = "bold 28px 'Segoe UI'";
            octx.fillText(`LV: ${player.level}`, 30, 65);
            octx.fillStyle = "#e74c3c";
            octx.font = "bold 24px 'Segoe UI'";
            octx.fillText(`HP: ${Math.max(0, Math.floor(player.hp))} / ${player.maxHp}`, 30, 95);
            octx.fillStyle = "#ecf0f1";
            octx.font = "bold 20px 'Segoe UI'";
            const m = Math.floor(gameTime / 60).toString().padStart(2, '0');
            const s = Math.floor(gameTime % 60).toString().padStart(2, '0');
            octx.fillText(`時間: ${m}:${s}`, 30, 125);

            // 輸出輕量級的 JPEG Base64
            return offCanvas.toDataURL('image/jpeg', 0.4);
        }

        function spawnEnemy() {
            if (!isLoaded || !isGameStarted) return;
            let angle = Math.random() * Math.PI * 2;
            let distance = Math.max(canvas.width, canvas.height) / 1.5;
            let ex = player.x + Math.cos(angle) * distance;
            let ey = player.y + Math.sin(angle) * distance;
            const enemyRadius = 20;
            ex = Math.max(enemyRadius, Math.min(mapBounds.w - enemyRadius, ex));
            ey = Math.max(enemyRadius, Math.min(mapBounds.h - enemyRadius, ey));
            const difficultyMultiplier = 1 + (gameTime / 90); 
            const randomImg = enemyImages[Math.floor(Math.random() * enemyImages.length)];
            enemies.push({ x: ex, y: ey, radius: enemyRadius, speed: (60 + Math.random() * 30), hp: 35 * difficultyMultiplier, damage: 15, img: randomImg });
        }

        function shootNearestEnemy() {
            if (enemies.length === 0) return;
            let nearestEnemy = null;
            let minDist = Infinity;
            enemies.forEach(enemy => {
                const dx = enemy.x - player.x;
                const dy = enemy.y - player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < minDist) { minDist = dist; nearestEnemy = enemy; }
            });

            if (nearestEnemy) {
                const dx = nearestEnemy.x - player.x;
                const dy = nearestEnemy.y - player.y;
                const baseAngle = Math.atan2(dy, dx);
                
                const totalProjectiles = 1 + player.skills.count;
                const spreadAngle = 0.25; 
                const startAngle = baseAngle - ((totalProjectiles - 1) * spreadAngle) / 2;

                for (let i = 0; i < totalProjectiles; i++) {
                    const angle = startAngle + i * spreadAngle;
                    projectiles.push({
                        x: player.x,
                        y: player.y,
                        vx: Math.cos(angle) * player.attackSpeed,
                        vy: Math.sin(angle) * player.attackSpeed,
                        text: quotes[Math.floor(Math.random() * quotes.length)],
                        damage: player.attackDamage,
                        life: 3.0,
                        bounceCount: 0 
                    });
                }
            }
        }

        function update(dt) {
            if (!isLoaded || !isGameStarted || isGameOver || isLevelUpMenuOpen || isLevelUpTransition) return;
            gameTime += dt;

            let moveX = 0, moveY = 0;
            if (keys['KeyW'] || keys['ArrowUp']) moveY -= 1;
            if (keys['KeyS'] || keys['ArrowDown']) moveY += 1;
            if (keys['KeyA'] || keys['ArrowLeft']) moveX -= 1;
            if (keys['KeyD'] || keys['ArrowRight']) moveX += 1;

            if (moveX === 0 && moveY === 0) {
                moveX = mobileMoveX;
                moveY = mobileMoveY;
            }

            if (moveX !== 0 || moveY !== 0) {
                const len = Math.sqrt(moveX * moveX + moveY * moveY);
                if (len > 0.05) { 
                    player.x += (moveX / len) * player.speed * dt;
                    player.y += (moveY / len) * player.speed * dt;
                }
            }

            if (moveX > 0.05) player.facingRight = true;
            else if (moveX < -0.05) player.facingRight = false;

            player.x = Math.max(player.drawH/2, Math.min(mapBounds.w - player.drawH/2, player.x));
            player.y = Math.max(player.drawH/2, Math.min(mapBounds.h - player.drawH/2, player.y));

            camera.x = Math.max(0, Math.min(mapBounds.w - canvas.width, player.x - canvas.width / 2));
            camera.y = Math.max(0, Math.min(mapBounds.h - canvas.height, player.y - canvas.height / 2));
            
            const screenX = player.x - camera.x;
            const screenY = player.y - camera.y;
            playerDom.style.transform = `translate(${screenX - player.drawW / 2}px, ${screenY - player.drawH / 2}px) scaleX(${player.facingRight ? -1 : 1})`;
            
            nameTagDom.style.left = `${screenX}px`;
            nameTagDom.style.top = `${screenY - player.drawH / 2 - 35}px`;

            hpBarBgDom.style.left = `${screenX}px`;
            hpBarBgDom.style.top = `${screenY - player.drawH / 2 - 5}px`; 
            hpBarDom.style.width = `${Math.max(0, (player.hp / player.maxHp) * 100)}%`;

            player.attackTimer -= dt;
            if (player.attackTimer <= 0) { shootNearestEnemy(); player.attackTimer = player.attackCooldown; }

            enemySpawnTimer -= dt;
            if (enemySpawnTimer <= 0) { spawnEnemy(); enemySpawnTimer = Math.max(0.15, 1.2 - (gameTime / 120)); }

            let isHitThisFrame = false; 

            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const dx = player.x - e.x, dy = player.y - e.y, dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 5) { e.x += (dx/dist)*e.speed*dt; e.y += (dy/dist)*e.speed*dt; }
                if (dist < e.radius + player.hitboxRadius) { 
                    player.hp -= e.damage * dt; 
                    isHitThisFrame = true; 
                    if (player.hp <= 0) {
                        gameOver();
                        return;
                    }
                }
            }

            if (isHitThisFrame && !isGameOver) {
                damageOverlayDom.style.backgroundColor = 'rgba(255, 0, 0, 0.3)';
            } else {
                damageOverlayDom.style.backgroundColor = 'transparent';
            }

            const hitboxBonus = player.skills.area * 8; 

            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
                let hit = false;
                
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    const dx = p.x - e.x, dy = p.y - e.y;
                    
                    if (Math.sqrt(dx*dx + dy*dy) < e.radius + 10 + hitboxBonus) {
                        e.hp -= p.damage; 
                        hit = true;
                        if (e.hp <= 0) { 
                            gems.push({ x: e.x, y: e.y, xp: 60 }); 
                            enemies.splice(j, 1); 
                        }
                        break; 
                    }
                }
                
                if (hit) {
                    if (p.bounceCount < player.skills.bounce) {
                        p.bounceCount++;
                        const currentAngle = Math.atan2(p.vy, p.vx);
                        const bounceAngle = currentAngle + Math.PI + (Math.random() - 0.5) * 0.6;
                        p.vx = Math.cos(bounceAngle) * player.attackSpeed;
                        p.vy = Math.sin(bounceAngle) * player.attackSpeed;
                    } else {
                        projectiles.splice(i, 1);
                    }
                } else if (p.life <= 0) {
                    projectiles.splice(i, 1);
                }
            }

            for (let i = gems.length - 1; i >= 0; i--) {
                const g = gems[i];
                const dx = player.x - g.x, dy = player.y - g.y, dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 180) { g.x += (dx/dist)*350*dt; g.y += (dy/dist)*350*dt; }
                if (dist < 35) { 
                    player.xp += g.xp * player.xpMultiplier; 
                    gems.splice(i, 1); 
                }
            }

            updateUI();

            if (player.xp >= player.xpNeeded) {
                isLevelUpTransition = true;
                playerDom.src = playerLevelUpImg; 
                
                setTimeout(() => {
                    levelUp();
                }, 500); 
            }
        }

        function draw() {
            if (!isLoaded) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bgImg, -camera.x, -camera.y, mapBounds.w, mapBounds.h);
            if (!isGameStarted) return;

            gems.forEach(g => {
                if (gemImg.complete) {
                    const drawWidth = gemImg.naturalWidth * 0.1;
                    const drawHeight = gemImg.naturalHeight * 0.1;
                    ctx.drawImage(gemImg, g.x - camera.x - drawWidth / 2, g.y - camera.y - drawHeight / 2, drawWidth, drawHeight);
                }
            });

            enemies.forEach(e => {
                const drawSize = e.radius * 2.5;
                if (e.img.complete) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(e.x - camera.x, e.y - camera.y, drawSize / 2, 0, Math.PI * 2);
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = '#f1c40f'; 
                    ctx.stroke();
                    ctx.clip();
                    ctx.drawImage(e.img, e.x - camera.x - drawSize/2, e.y - camera.y - drawSize/2, drawSize, drawSize);
                    ctx.restore();
                }
            });

            const fontSize = 16 + (player.skills.area * 5); 
            ctx.fillStyle = '#fff';
            ctx.font = `bold ${fontSize}px Arial`;
            
            projectiles.forEach(p => {
                ctx.fillText(p.text, p.x - camera.x, p.y - camera.y);
            });
        }

        function gameLoop(timestamp) {
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            update(Math.min(dt, 0.05));
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
