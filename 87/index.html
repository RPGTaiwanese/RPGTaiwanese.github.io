<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天使鵝鵝嘴砲聊天室</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #playerNameTag {
            position: absolute;
            z-index: 3; 
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            pointer-events: none;
            display: none; 
            transform: translateX(-50%); 
            white-space: nowrap;
        }
        #playerHpBarBg {
            position: absolute;
            z-index: 3;
            width: 80px;
            height: 10px;
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid #222;
            border-radius: 5px;
            display: none;
            transform: translateX(-50%);
            pointer-events: none;
            overflow: hidden;
        }
        #playerHpBar {
            width: 100%;
            height: 100%;
            background-color: #e74c3c;
            transition: width 0.1s linear;
        }
        #playerSprite {
            position: absolute;
            z-index: 2;
            pointer-events: none;
            will-change: transform;
            display: none;
            height: 180px; 
        }
        #damageOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: transparent;
            pointer-events: none;
            z-index: 25;
            transition: background-color 0.1s;
        }

        /* 左側 UI 區塊 */
        #ui {
            position: absolute;
            top: 30px; 
            left: 15px;
            pointer-events: none;
            text-shadow: 2px 2px 2px #000;
            z-index: 10;
            display: none;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #ui h2, #ui h3, #ui p {
            margin: 5px 0;
            font-weight: bold;
        }
        #ui h2 {
            color: #e74c3c;
            font-size: 24px;
        }
        #ui h3 {
            color: #ecf0f1;
            font-size: 20px;
        }
        #levelText {
            font-size: 28px;
            color: #f1c40f;
            margin-bottom: 10px !important;
            border-bottom: 2px solid #f1c40f;
            padding-bottom: 5px;
        }
        #skillList {
            margin-top: 15px;
            font-size: 15px;
            color: #3498db;
        }

        #xpBarContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 10;
            display: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        #xpBar {
            width: 0%;
            height: 100%;
            background-color: #f1c40f; 
            transition: width 0.1s;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #startScreen h1 {
            font-size: 54px;
            margin-bottom: 20px;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }
        .input-group {
            margin-bottom: 30px;
            text-align: center;
        }
        .input-group input {
            padding: 12px;
            font-size: 20px;
            border-radius: 8px;
            border: 2px solid #34495e;
            outline: none;
            text-align: center;
            width: 300px;
            background: #2c3e50;
            color: white;
        }
        .input-group input::placeholder {
            color: #95a5a6;
        }
        .char-selection {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .char-card {
            background: #2c3e50;
            border: 3px solid #34495e;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            width: 200px;
        }
        .char-card:hover {
            transform: scale(1.05);
            border-color: #3498db;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.5);
        }
        .char-card img {
            width: 100px;
            height: auto;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .char-card h3 {
            margin: 0;
            color: #fff;
            font-size: 20px;
        }

        #levelUpScreen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 15px;
            border: 3px solid #f1c40f;
            z-index: 40;
            text-align: center;
            width: 80%;
            max-width: 450px;
            max-height: 85vh; 
            overflow-y: auto; 
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.6);
        }
        #levelUpScreen h1 {
            color: #f1c40f;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 2px 2px 2px #000;
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.95);
            padding-bottom: 10px;
            z-index: 2;
        }
        .skill-btn {
            display: block;
            width: 100%;
            margin: 10px 0; 
            padding: 10px; 
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: #2c3e50;
            color: #ecf0f1;
            border: 2px solid #34495e;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .skill-btn:hover {
            background: #2980b9;
            border-color: #3498db;
            transform: scale(1.02);
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.4);
        }

        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.95);
            padding: 50px;
            border-radius: 15px;
            border: 3px solid #e74c3c;
            z-index: 60; 
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }
        #gameOver h1 {
            color: #e74c3c;
            margin-top: 0;
            font-size: 48px;
            text-shadow: 2px 2px 0px #000;
        }
        #finalStats {
            font-size: 22px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        button.restart-btn {
            padding: 12px 30px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background 0.2s, transform 0.2s;
        }
        button.restart-btn:hover { background: #27ae60; transform: scale(1.05); }

        #joystickZone {
            position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.15); border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            z-index: 30; display: none; touch-action: none;
        }
        #joystickStick {
            position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.5); border-radius: 50%; pointer-events: none;
        }

        /* ------------------ 新增：排行榜相關 CSS ------------------ */
        #miniLeaderboard {
            position: absolute; top: 30px; right: 15px; background: rgba(0, 0, 0, 0.6); border: 2px solid #f1c40f;
            border-radius: 10px; padding: 10px 15px; z-index: 45; cursor: pointer; transition: transform 0.2s;
            width: 200px;
        }
        #miniLeaderboard:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(241, 196, 15, 0.4); }
        #miniLeaderboard h3 { margin: 0 0 10px 0; color: #f1c40f; text-align: center; border-bottom: 1px solid #f1c40f; padding-bottom: 5px;}
        #miniLeaderboard ul { list-style: none; padding: 0; margin: 0; font-size: 14px; max-height: 250px; overflow-y: auto; }
        #miniLeaderboard li { margin-bottom: 5px; display: flex; justify-content: space-between; border-bottom: 1px dashed #555; padding-bottom: 3px;}
        #miniLeaderboard li span.name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100px; }

        #fullLeaderboardModal {
            display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85); z-index: 100; align-items: center; justify-content: center;
        }
        .leaderboard-content {
            background: rgba(44, 62, 80, 0.95); border: 3px solid #f1c40f; border-radius: 15px;
            padding: 20px; width: 80%; max-width: 600px; max-height: 80vh; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .close-btn { position: absolute; top: 15px; right: 20px; background: transparent; border: none; color: white; font-size: 28px; cursor: pointer; font-weight: bold;}
        .close-btn:hover { color: #e74c3c; }
        .leaderboard-content h2 { text-align: center; color: #f1c40f; margin-top: 0; font-size: 32px;}
        #leaderboardSearch { padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 2px solid #34495e; width: 100%; box-sizing: border-box; font-size: 16px; background: #1a252f; color: white; }
        .list-container { overflow-y: auto; flex-grow: 1; border-radius: 8px; border: 1px solid #34495e;}
        .list-container table { width: 100%; border-collapse: collapse; text-align: center; background: #2c3e50; }
        .list-container th, .list-container td { padding: 12px; border-bottom: 1px solid #34495e; }
        .list-container th { color: #f1c40f; position: sticky; top: 0; background: #1a252f; }
        .list-container tr:nth-child(even) { background-color: rgba(0,0,0,0.1); }
        .list-container tr:hover { background-color: rgba(52, 152, 219, 0.2); }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="miniLeaderboard" onclick="openFullLeaderboard()">
            <h3>排行榜 Top 10</h3>
            <ul id="miniLeaderboardList">
                <li>載入中...</li>
            </ul>
        </div>

        <div id="fullLeaderboardModal">
            <div class="leaderboard-content">
                <button class="close-btn" onclick="closeFullLeaderboard()">×</button>
                <h2>🌍 存活排行榜</h2>
                <input type="text" id="leaderboardSearch" placeholder="搜尋玩家名稱..." oninput="filterLeaderboard()">
                <div class="list-container">
                    <table id="fullLeaderboardTable">
                        <thead>
                            <tr>
                                <th>名次</th>
                                <th>玩家名稱</th>
                                <th>生存時間</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="startScreen">
            <h1>開始嘴砲時間</h1>
            <div class="input-group">
                <input type="text" id="playerNameInput" placeholder="請輸入玩家名稱 (可留空)" autocomplete="off">
            </div>
            <h2>請選擇角色</h2>
            <div class="char-selection">
                <div class="char-card" onclick="startGame()">
                    <img src="https://truth.bahamut.com.tw/s01/202606/43564bf4cf60b9503351e352c70275c1.GIF" alt="天使鵝鵝">
                    <h3>角色1<br>天使鵝鵝</h3>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
        <div id="damageOverlay"></div>
        <div id="playerNameTag">玩家名稱</div>
        <div id="playerHpBarBg"><div id="playerHpBar"></div></div>
        <img id="playerSprite" src="https://truth.bahamut.com.tw/s01/202606/43564bf4cf60b9503351e352c70275c1.GIF" alt="Player">
        <div id="xpBarContainer"><div id="xpBar"></div></div>
        
        <div id="ui">
            <h3 id="levelText">LV: 1</h3>
            <h2 id="hpText">HP: 100 / 100</h2>
            <h3 id="timeText">時間: 00:00</h3>
            <div id="skillList">
                <p id="skill0Text">▶ 嘴完人就跑 : LV 0</p>
                <p id="skill1Text">▶ 增加言語傷害 : LV 0</p>
                <p id="skill2Text">▶ 獲得嘴人成就感 : LV 0</p>
                <p id="skill3Text">▶ 多開戰場 : LV 0</p>
                <p id="skill4Text">▶ 五速嘴 : LV 0</p>
                <p id="skill5Text">▶ 打臉笑死 : LV 0</p>
                <p id="skill6Text">▶ 一言不和開地圖炮 : LV 0</p>
            </div>
        </div>

        <div id="joystickZone"><div id="joystickStick"></div></div>

        <div id="levelUpScreen">
            <h1>升級！選擇一項技能</h1>
            <div id="skillOptionsContainer"></div>
        </div>

        <div id="gameOver">
            <h1>遊戲結束</h1>
            <p id="finalStats"></p>
            <button class="restart-btn" onclick="location.reload()">重新開始</button>
        </div>
    </div>

    <script type="module">
        // ------------------ Firebase 初始化與設定 ------------------
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaq5Y89srrIozUZY7sUJALvAamIZsxyuo",
            authDomain: "mmorpg-a836b.firebaseapp.com",
            databaseURL: "https://mmorpg-a836b.firebaseio.com",
            projectId: "mmorpg-a836b",
            storageBucket: "mmorpg-a836b.appspot.com",
            messagingSenderId: "995630256799",
            appId: "1:995630256799:web:913fbb7303b58efaff08aa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let uid = null;
        let allScores = []; // 儲存所有排行榜資料

        // 匿名登入
        signInAnonymously(auth).catch((error) => {
            console.error("Firebase登入失敗:", error);
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                uid = user.uid;
            }
        });

        // 監聽排行榜資料
        const leaderboardRef = ref(db, 'leaderboard');
        onValue(leaderboardRef, (snapshot) => {
            const data = snapshot.val();
            allScores = [];
            if (data) {
                for (let key in data) {
                    allScores.push(data[key]);
                }
                // 依照生存時間降冪排序 (活最久的在最前面)
                allScores.sort((a, b) => b.time - a.time);
            }
            updateLeaderboardUI();
        });

        function formatTimeText(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateLeaderboardUI() {
            // 更新右上角 Mini 榜單 (Top 10)
            const miniList = document.getElementById('miniLeaderboardList');
            miniList.innerHTML = '';
            const top10 = allScores.slice(0, 10);
            if (top10.length === 0) {
                miniList.innerHTML = '<li>尚無資料</li>';
            } else {
                top10.forEach((score, index) => {
                    const li = document.createElement('li');
                    let medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}.`;
                    li.innerHTML = `<span class="name">${medal} ${score.name}</span> <span>${formatTimeText(score.time)}</span>`;
                    miniList.appendChild(li);
                });
            }

            // 更新完整榜單表格
            renderFullLeaderboardTable(allScores);
        }

        function renderFullLeaderboardTable(scores) {
            const tbody = document.querySelector('#fullLeaderboardTable tbody');
            tbody.innerHTML = '';
            scores.forEach((score, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${score.name}</td>
                    <td>${formatTimeText(score.time)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 上傳成績至 Firebase
        function saveScoreToFirebase(playerName, survivalTime) {
            if (!uid) return;
            const newRecordRef = push(ref(db, 'leaderboard'));
            set(newRecordRef, {
                uid: uid,
                name: playerName,
                time: survivalTime,
                timestamp: Date.now()
            });
        }

        // 綁定 UI 事件至全域，供 HTML onclick 呼叫
        window.openFullLeaderboard = () => { document.getElementById('fullLeaderboardModal').style.display = 'flex'; };
        window.closeFullLeaderboard = () => { document.getElementById('fullLeaderboardModal').style.display = 'none'; };
        window.filterLeaderboard = () => {
            const query = document.getElementById('leaderboardSearch').value.toLowerCase();
            const filtered = allScores.filter(score => score.name.toLowerCase().includes(query));
            renderFullLeaderboardTable(filtered);
        };


        // ------------------ 遊戲主邏輯 ------------------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const playerDom = document.getElementById('playerSprite');
        const nameTagDom = document.getElementById('playerNameTag');
        const hpBarBgDom = document.getElementById('playerHpBarBg'); 
        const hpBarDom = document.getElementById('playerHpBar');     
        const damageOverlayDom = document.getElementById('damageOverlay'); 
        
        const gameBgm = new Audio('BGM.mp3');
        gameBgm.loop = true;
        gameBgm.volume = 0.4; 

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const quotes = [
            "喜歡支那ㄉ可以考慮看看喔~", "有人需要企鵝嗎~", 
            "企鵝是世界上最可愛的動物~", "ㄏㄏ我是鵝鵝", 
            "這邊有人知道雷丘為什ㄇ那麼爛ㄇ~", "窩拿窩ㄉㄐㄐ保證~", 
            "其他ㄉ都不是問題~", "雖然ㄋ們可能會餓死 但窩們祝福ㄋ們下輩子別投胎到獨裁國家ㄌ~"
        ];

        const BG_SCALE = 1.5; 
        const bgImg = new Image();
        bgImg.src = 'https://truth.bahamut.com.tw/s01/202606/59ee76a4fa72093f25e147c1a26da16f.JPG';
        const gemImg = new Image();
        gemImg.src = 'https://truth.bahamut.com.tw/s01/202606/2a1e9ed6c7071377696d76d8902c0f04.PNG';

        const enemyImgUrls = [
            "https://avatar2.bahamut.com.tw/avataruserpic/a/6/a66294836/a66294836_s.png",
            "https://avatar2.bahamut.com.tw/avataruserpic/b/o/boy8369431/boy8369431_s.png",
            "https://avatar2.bahamut.com.tw/avataruserpic/f/l/flys8028/flys8028_s.png",
            "https://avatar2.bahamut.com.tw/avataruserpic/n/b/nba2009/nba2009_s.png",
            "https://avatar2.bahamut.com.tw/avataruserpic/j/i/jinung86/jinung86_s.png",
            "https://avatar2.bahamut.com.tw/avataruserpic/a/2/a27735802/a27735802_s.png",
            "https://avatar2.bahamut.com.tw/avataruserpic/k/2/k22029623/k22029623_s.png",
            "https://avatar2.bahamut.com.tw/avataruserpic/o/m/omger8720/omger8720_s.png",
            "https://avatar2.bahamut.com.tw/avataruserpic/g/n/gn01252067/gn01252067_s.png",
            "https://avatar2.bahamut.com.tw/avataruserpic/n/a/nana373721/nana373721_s.png"
        ];
        const enemyImages = enemyImgUrls.map(url => {
            const img = new Image();
            img.src = url;
            return img;
        });

        const playerNormalImg = "https://truth.bahamut.com.tw/s01/202606/43564bf4cf60b9503351e352c70275c1.GIF";
        const playerLevelUpImg = "https://truth.bahamut.com.tw/s01/202606/0ba3166828aa01fb90c7c7a9d998bf8e.PNG";

        let isLoaded = false, isGameStarted = false, isGameOver = false, isLevelUpMenuOpen = false, isLevelUpTransition = false;
        let gameTime = 0, lastTime = performance.now();
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        let mobileMoveX = 0, mobileMoveY = 0, joystickActive = false, joystickRect = null;
        const joystickZone = document.getElementById('joystickZone');
        const joystickStick = document.getElementById('joystickStick');

        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) joystickZone.style.display = 'block';

        joystickZone.addEventListener('touchstart', e => {
            joystickActive = true;
            joystickRect = joystickZone.getBoundingClientRect();
            handleJoystickMove(e.touches[0]);
        }, { passive: false });

        window.addEventListener('touchmove', e => {
            if (!joystickActive) return;
            e.preventDefault(); 
            handleJoystickMove(e.touches[0]);
        }, { passive: false });

        window.addEventListener('touchend', () => {
            if (!joystickActive) return;
            joystickActive = false;
            mobileMoveX = 0; mobileMoveY = 0;
            joystickStick.style.transform = 'translate(0px, 0px)';
        });

        function handleJoystickMove(touch) {
            const centerX = joystickRect.left + joystickRect.width / 2;
            const centerY = joystickRect.top + joystickRect.height / 2;
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const maxDist = joystickRect.width / 2;

            if (dist > maxDist) { dx = (dx / dist) * maxDist; dy = (dy / dist) * maxDist; }
            joystickStick.style.transform = `translate(${dx}px, ${dy}px)`;
            mobileMoveX = dx / maxDist; mobileMoveY = dy / maxDist;
        }

        let mapBounds = { w: 0, h: 0 };
        const camera = { x: 0, y: 0 };
        const player = {
            name: "", x: 0, y: 0, drawW: 0, drawH: 180, hitboxRadius: 25, speed: 220, hp: 100, maxHp: 100,
            level: 1, xp: 0, xpNeeded: 100, xpMultiplier: 1.0, attackCooldown: 1.2, attackTimer: 0, attackDamage: 20,
            attackSpeed: 300, facingRight: true,
            skills: { speed: 0, damage: 0, xp: 0, count: 0, atkSpeed: 0, bounce: 0, area: 0 } 
        };

        const skillPool = [
            { id: 'speed', name: '嘴完人就跑', desc: '移動速度上升', current: () => player.skills.speed },
            { id: 'damage', name: '增加言語傷害', desc: '增加彈幕傷害', current: () => player.skills.damage },
            { id: 'xp', name: '獲得嘴人成就感', desc: '經驗值獲取提升', current: () => player.skills.xp },
            { id: 'count', name: '多開戰場', desc: '增加一次發射的文字數量', current: () => player.skills.count },
            { id: 'atkSpeed', name: '五速嘴', desc: '加速文字彈幕發射速度', current: () => player.skills.atkSpeed },
            { id: 'bounce', name: '打臉笑死', desc: '彈幕命中敵人時會反彈', current: () => player.skills.bounce },
            { id: 'area', name: '一言不和就開地圖炮', desc: '增加文字的大小跟攻擊範圍', current: () => player.skills.area }
        ];

        let loadedCount = 0;
        function checkInit() {
            loadedCount++;
            if (loadedCount === 3) { 
                isLoaded = true; player.x = mapBounds.w / 2; player.y = mapBounds.h / 2; requestAnimationFrame(gameLoop);
            }
        }

        bgImg.onload = () => { mapBounds.w = bgImg.naturalWidth * BG_SCALE; mapBounds.h = bgImg.naturalHeight * BG_SCALE; checkInit(); };
        playerDom.onload = () => {
            const ratio = playerDom.naturalWidth / playerDom.naturalHeight;
            player.drawW = player.drawH * ratio;
            playerDom.style.width = player.drawW + 'px';
            if (!isLoaded) checkInit();
        };
        gemImg.onload = () => { if(!isLoaded) checkInit(); };

        function updateSkillDisplay() {
            document.getElementById('levelText').innerText = `LV: ${player.level}`;
            document.getElementById('skill0Text').innerText = `▶ 嘴完人就跑 : LV ${player.skills.speed}`;
            document.getElementById('skill1Text').innerText = `▶ 增加言語傷害 : LV ${player.skills.damage}`;
            document.getElementById('skill2Text').innerText = `▶ 獲得嘴人成就感 : LV ${player.skills.xp}`;
            document.getElementById('skill3Text').innerText = `▶ 多開戰場 : LV ${player.skills.count}`;
            document.getElementById('skill4Text').innerText = `▶ 五速嘴 : LV ${player.skills.atkSpeed}`;
            document.getElementById('skill5Text').innerText = `▶ 打臉笑死 : LV ${player.skills.bounce}`;
            document.getElementById('skill6Text').innerText = `▶ 一言不和開地圖炮 : LV ${player.skills.area}`;
        }

        window.startGame = function() {
            if (!isLoaded) return;
            gameBgm.play().catch(err => { console.log("音樂播放失敗", err); });

            const inputName = document.getElementById('playerNameInput').value.trim();
            if (inputName !== "") {
                player.name = inputName;
            } else {
                const randomNum = Math.floor(Math.random() * 999999) + 1;
                player.name = String(randomNum).padStart(6, '0') + "勇者";
            }
            
            nameTagDom.innerText = player.name;
            updateSkillDisplay();

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            document.getElementById('xpBarContainer').style.display = 'block';
            playerDom.style.display = 'block';
            nameTagDom.style.display = 'block';
            hpBarBgDom.style.display = 'block'; 

            isGameStarted = true;
            lastTime = performance.now(); 
        };

        const enemies = [], projectiles = [], gems = [];
        let enemySpawnTimer = 0;

        function spawnEnemy() {
            if (!isLoaded || !isGameStarted) return;
            let angle = Math.random() * Math.PI * 2;
            let distance = Math.max(canvas.width, canvas.height) / 1.5;
            let ex = player.x + Math.cos(angle) * distance;
            let ey = player.y + Math.sin(angle) * distance;
            const enemyRadius = 20;
            ex = Math.max(enemyRadius, Math.min(mapBounds.w - enemyRadius, ex));
            ey = Math.max(enemyRadius, Math.min(mapBounds.h - enemyRadius, ey));
            const difficultyMultiplier = 1 + (gameTime / 90); 
            const randomImg = enemyImages[Math.floor(Math.random() * enemyImages.length)];
            enemies.push({ x: ex, y: ey, radius: enemyRadius, speed: (60 + Math.random() * 30), hp: 35 * difficultyMultiplier, damage: 15, img: randomImg });
        }

        function shootNearestEnemy() {
            if (enemies.length === 0) return;
            let nearestEnemy = null, minDist = Infinity;
            enemies.forEach(enemy => {
                const dx = enemy.x - player.x, dy = enemy.y - player.y, dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < minDist) { minDist = dist; nearestEnemy = enemy; }
            });

            if (nearestEnemy) {
                const dx = nearestEnemy.x - player.x, dy = nearestEnemy.y - player.y;
                const baseAngle = Math.atan2(dy, dx);
                const totalProjectiles = 1 + player.skills.count;
                const spreadAngle = 0.25; 
                const startAngle = baseAngle - ((totalProjectiles - 1) * spreadAngle) / 2;

                for (let i = 0; i < totalProjectiles; i++) {
                    const angle = startAngle + i * spreadAngle;
                    projectiles.push({
                        x: player.x, y: player.y,
                        vx: Math.cos(angle) * player.attackSpeed, vy: Math.sin(angle) * player.attackSpeed,
                        text: quotes[Math.floor(Math.random() * quotes.length)],
                        damage: player.attackDamage, life: 3.0, bounceCount: 0 
                    });
                }
            }
        }

        function levelUp() {
            player.level++;
            player.xp -= player.xpNeeded;
            player.xpNeeded = Math.floor(player.xpNeeded * (player.level <= 15 ? 1.15 : 1.4)); 
            player.maxHp += 15; player.hp = player.maxHp; 
            
            updateSkillDisplay();
            damageOverlayDom.style.backgroundColor = 'transparent';

            const container = document.getElementById('skillOptionsContainer');
            container.innerHTML = '';
            
            skillPool.forEach(skill => {
                const btn = document.createElement('button');
                btn.className = 'skill-btn';
                btn.innerHTML = `${skill.name} (當前 LV.${skill.current()})<br><span style="font-size: 14px; color: #bdc3c7;">(${skill.desc})</span>`;
                btn.onclick = () => window.chooseSkill(skill.id);
                container.appendChild(btn);
            });

            isLevelUpMenuOpen = true;
            document.getElementById('levelUpScreen').style.display = 'block';
            document.getElementById('levelUpScreen').scrollTop = 0; 
        }

        window.chooseSkill = function(skillId) {
            if (skillId === 'speed') { player.speed += 20; player.skills.speed++; }
            else if (skillId === 'damage') { player.attackDamage += 12; player.skills.damage++; }
            else if (skillId === 'xp') { player.xpMultiplier += 0.25; player.skills.xp++; }
            else if (skillId === 'count') { player.skills.count++; }
            else if (skillId === 'atkSpeed') { player.skills.atkSpeed++; player.attackCooldown = Math.max(0.15, 1.2 * Math.pow(0.75, player.skills.atkSpeed)); }
            else if (skillId === 'bounce') { player.skills.bounce++; }
            else if (skillId === 'area') { player.skills.area++; }

            updateSkillDisplay();
            playerDom.src = playerNormalImg;
            isLevelUpTransition = false; 

            document.getElementById('levelUpScreen').style.display = 'none';
            isLevelUpMenuOpen = false;
            lastTime = performance.now(); 
        };

        function updateUI() {
            document.getElementById('hpText').innerText = `HP: ${Math.max(0, Math.floor(player.hp))} / ${player.maxHp}`;
            document.getElementById('xpBar').style.width = `${Math.min(100, (player.xp / player.xpNeeded) * 100)}%`;
            document.getElementById('timeText').innerText = `時間: ${formatTimeText(gameTime)}`;
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('gameOver').style.display = 'block';
            playerDom.style.display = 'none'; nameTagDom.style.display = 'none'; hpBarBgDom.style.display = 'none'; 
            damageOverlayDom.style.backgroundColor = 'transparent'; 
            
            document.getElementById('finalStats').innerHTML = `玩家: <b>${player.name}</b><br>最終等級: <b>${player.level}</b><br>存活時間: <b>${formatTimeText(gameTime)}</b>`;

            // ----------- 將成績存入 Firebase -----------
            saveScoreToFirebase(player.name, gameTime);
        }

        function update(dt) {
            if (!isLoaded || !isGameStarted || isGameOver || isLevelUpMenuOpen || isLevelUpTransition) return;
            gameTime += dt;

            let moveX = 0, moveY = 0;
            if (keys['KeyW'] || keys['ArrowUp']) moveY -= 1;
            if (keys['KeyS'] || keys['ArrowDown']) moveY += 1;
            if (keys['KeyA'] || keys['ArrowLeft']) moveX -= 1;
            if (keys['KeyD'] || keys['ArrowRight']) moveX += 1;

            if (moveX === 0 && moveY === 0) { moveX = mobileMoveX; moveY = mobileMoveY; }

            if (moveX !== 0 || moveY !== 0) {
                const len = Math.sqrt(moveX * moveX + moveY * moveY);
                if (len > 0.05) { 
                    player.x += (moveX / len) * player.speed * dt;
                    player.y += (moveY / len) * player.speed * dt;
                }
            }

            if (moveX > 0.05) player.facingRight = true; else if (moveX < -0.05) player.facingRight = false;

            player.x = Math.max(player.drawH/2, Math.min(mapBounds.w - player.drawH/2, player.x));
            player.y = Math.max(player.drawH/2, Math.min(mapBounds.h - player.drawH/2, player.y));
            camera.x = Math.max(0, Math.min(mapBounds.w - canvas.width, player.x - canvas.width / 2));
            camera.y = Math.max(0, Math.min(mapBounds.h - canvas.height, player.y - canvas.height / 2));
            
            const screenX = player.x - camera.x, screenY = player.y - camera.y;
            playerDom.style.transform = `translate(${screenX - player.drawW / 2}px, ${screenY - player.drawH / 2}px) scaleX(${player.facingRight ? -1 : 1})`;
            
            nameTagDom.style.left = `${screenX}px`; nameTagDom.style.top = `${screenY - player.drawH / 2 - 35}px`;
            hpBarBgDom.style.left = `${screenX}px`; hpBarBgDom.style.top = `${screenY - player.drawH / 2 - 5}px`; 
            hpBarDom.style.width = `${Math.max(0, (player.hp / player.maxHp) * 100)}%`;

            player.attackTimer -= dt;
            if (player.attackTimer <= 0) { shootNearestEnemy(); player.attackTimer = player.attackCooldown; }

            enemySpawnTimer -= dt;
            if (enemySpawnTimer <= 0) { spawnEnemy(); enemySpawnTimer = Math.max(0.15, 1.2 - (gameTime / 120)); }

            let isHitThisFrame = false; 
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const dx = player.x - e.x, dy = player.y - e.y, dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 5) { e.x += (dx/dist)*e.speed*dt; e.y += (dy/dist)*e.speed*dt; }
                if (dist < e.radius + player.hitboxRadius) { 
                    player.hp -= e.damage * dt; isHitThisFrame = true; 
                    if (player.hp <= 0) { gameOver(); return; }
                }
            }

            damageOverlayDom.style.backgroundColor = isHitThisFrame && !isGameOver ? 'rgba(255, 0, 0, 0.3)' : 'transparent';
            const hitboxBonus = player.skills.area * 8; 

            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
                let hit = false;
                
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    const dx = p.x - e.x, dy = p.y - e.y;
                    
                    if (Math.sqrt(dx*dx + dy*dy) < e.radius + 10 + hitboxBonus) {
                        e.hp -= p.damage; hit = true;
                        if (e.hp <= 0) { gems.push({ x: e.x, y: e.y, xp: 60 }); enemies.splice(j, 1); }
                        break; 
                    }
                }
                
                if (hit) {
                    if (p.bounceCount < player.skills.bounce) {
                        p.bounceCount++;
                        const currentAngle = Math.atan2(p.vy, p.vx);
                        const bounceAngle = currentAngle + Math.PI + (Math.random() - 0.5) * 0.6;
                        p.vx = Math.cos(bounceAngle) * player.attackSpeed; p.vy = Math.sin(bounceAngle) * player.attackSpeed;
                    } else { projectiles.splice(i, 1); }
                } else if (p.life <= 0) { projectiles.splice(i, 1); }
            }

            for (let i = gems.length - 1; i >= 0; i--) {
                const g = gems[i];
                const dx = player.x - g.x, dy = player.y - g.y, dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 180) { g.x += (dx/dist)*350*dt; g.y += (dy/dist)*350*dt; }
                if (dist < 35) { player.xp += g.xp * player.xpMultiplier; gems.splice(i, 1); }
            }

            updateUI();

            if (player.xp >= player.xpNeeded) {
                isLevelUpTransition = true;
                playerDom.src = playerLevelUpImg; 
                setTimeout(() => { levelUp(); }, 500); 
            }
        }

        function draw() {
            if (!isLoaded) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bgImg, -camera.x, -camera.y, mapBounds.w, mapBounds.h);
            if (!isGameStarted) return;

            gems.forEach(g => {
                if (gemImg.complete) {
                    const drawWidth = gemImg.naturalWidth * 0.1, drawHeight = gemImg.naturalHeight * 0.1;
                    ctx.drawImage(gemImg, g.x - camera.x - drawWidth / 2, g.y - camera.y - drawHeight / 2, drawWidth, drawHeight);
                }
            });

            enemies.forEach(e => {
                const drawSize = e.radius * 2.5;
                if (e.img.complete) {
                    ctx.save(); ctx.beginPath(); ctx.arc(e.x - camera.x, e.y - camera.y, drawSize / 2, 0, Math.PI * 2);
                    ctx.lineWidth = 4; ctx.strokeStyle = '#f1c40f'; ctx.stroke(); ctx.clip();
                    ctx.drawImage(e.img, e.x - camera.x - drawSize/2, e.y - camera.y - drawSize/2, drawSize, drawSize);
                    ctx.restore();
                }
            });

            const fontSize = 16 + (player.skills.area * 5); 
            ctx.fillStyle = '#fff'; ctx.font = `bold ${fontSize}px Arial`;
            projectiles.forEach(p => { ctx.fillText(p.text, p.x - camera.x, p.y - camera.y); });
        }

        function gameLoop(timestamp) {
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            update(Math.min(dt, 0.05));
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
