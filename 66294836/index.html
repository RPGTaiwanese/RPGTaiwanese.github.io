<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerJS 畫面分享 - 穩定版</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        img { width: 120px; margin-bottom: 10px; }
        h2 { color: #333; }
        video { width: 100%; border: 3px solid #333; border-radius: 8px; margin-top: 20px; background: #000; display: none; }
        .controls { margin: 20px 0; padding: 15px; border: 1px dashed #ccc; border-radius: 10px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; background-color: #007bff; color: white; transition: 0.3s; margin: 5px; }
        button:hover { background-color: #0056b3; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        input { padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; width: 220px; outline: none; }
        input:focus { border-color: #007bff; }
        .status-box { margin: 15px 0; font-weight: bold; padding: 10px; background: #e9ecef; border-radius: 5px; cursor: pointer; }
        .status-box:hover { background: #dee2e6; }
        .hidden { display: none; }
        .hint { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.iloveapps.hk/wp-content/uploads/2014/02/dancing-banana.gif" alt="Dancing Banana">
    
    <div id="setup-area">
        <h2>螢幕分享系統</h2>
        <div class="controls">
            <button id="start-share-btn">分享我的網頁畫面</button>
            <div class="hint">點擊後選擇要分享的視窗</div>
        </div>
        <p>或是</p>
        <div class="controls">
            <input type="text" id="peer-id-input" placeholder="請貼上連線代碼">
            <button id="join-btn" style="background-color: #28a745;">加入觀看</button>
        </div>
    </div>

    <div id="active-area" class="hidden">
        <div class="status-box" id="display-id" title="點擊可複製代碼">正在取得連線代碼...</div>
        <video id="remote-video" autoplay playsinline></video>
        <br>
        <button id="stop-btn" style="background-color: #dc3545;">退出並返回主畫面</button>
    </div>
</div>

<script>
    let peer = null;
    let localStream = null;
    let currentCall = null;

    const setupArea = document.getElementById('setup-area');
    const activeArea = document.getElementById('active-area');
    const remoteVideo = document.getElementById('remote-video');
    const displayId = document.getElementById('display-id');

    // 1. 初始化 Peer 的核心函式 (加入 Callback 確保 ID 產生後才執行動作)
    function initPeer(callback) {
        if (peer && !peer.destroyed) {
            if (callback) callback();
            return;
        }

        peer = new Peer();
        
        peer.on('open', (id) => {
            console.log('Peer 連線成功，我的 ID:', id);
            displayId.innerText = `連線代碼: ${id} (點擊複製)`;
            if (callback) callback();
        });

        // 當有人連進來時 (作為分享者)
        peer.on('call', (call) => {
            console.log('接收到來自對方的連線請求...');
            call.answer(localStream); // 回應自己的螢幕串流
            handleCall(call);
        });

        peer.on('error', (err) => {
            console.error('Peer 發生錯誤:', err.type);
            alert('連線失敗: ' + err.type);
            resetUI();
        });
    }

    // 2. 處理通話串流的通用邏輯
    function handleCall(call) {
        currentCall = call;
        call.on('stream', (stream) => {
            console.log('收到畫面串流');
            activeArea.classList.remove('hidden');
            setupArea.classList.add('hidden');
            remoteVideo.style.display = "block";
            remoteVideo.srcObject = stream;
        });
        
        call.on('close', resetUI);
    }

    // 3. 按鈕事件：開始分享 (Host)
    document.getElementById('start-share-btn').addEventListener('click', async () => {
        try {
            // 取得螢幕畫面
            localStream = await navigator.mediaDevices.getDisplayMedia({ 
                video: { cursor: "always" }, 
                audio: false 
            });

            // 初始化 Peer 並顯示 UI
            initPeer(() => {
                activeArea.classList.remove('hidden');
                setupArea.classList.add('hidden');
                remoteVideo.style.display = "block";
                remoteVideo.srcObject = localStream;
                remoteVideo.muted = true; // 分享者自己看不需要聲音
            });

            // 如果使用者點擊瀏覽器上方的「停止分享」按鈕
            localStream.getVideoTracks()[0].onended = () => resetUI();

        } catch (err) {
            console.error('取得畫面失敗:', err);
            alert("請同意分享螢幕畫面才能啟動功能");
        }
    });

    // 4. 按鈕事件：加入觀看 (Viewer)
    document.getElementById('join-btn').addEventListener('click', () => {
        const targetId = document.getElementById('peer-id-input').value.trim();
        if (!targetId) return alert("請輸入對方的連線代碼");

        initPeer(() => {
            console.log('正在嘗試連線至:', targetId);
            // 撥號給分享者
            const call = peer.call(targetId, null);
            
            if (call) {
                handleCall(call);
                displayId.innerText = `正在觀看: ${targetId}`;
            } else {
                alert("無法建立通訊路徑");
            }
        });
    });

    // 5. 點擊代碼文字自動複製
    displayId.addEventListener('click', () => {
        const text = displayId.innerText.split(': ')[1]?.split(' ')[0];
        if (text && text !== "---") {
            navigator.clipboard.writeText(text);
            alert("代碼已複製到剪貼簿: " + text);
        }
    });

    // 6. 退出按鈕
    document.getElementById('stop-btn').addEventListener('click', resetUI);

    // 7. 重置介面與清理資源
    function resetUI() {
        console.log('重置 UI...');
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        if (currentCall) currentCall.close();
        if (peer) {
            peer.destroy();
            peer = null;
        }
        
        setupArea.classList.remove('hidden');
        activeArea.classList.add('hidden');
        remoteVideo.style.display = "none";
        remoteVideo.srcObject = null;
        displayId.innerText = "正在取得連線代碼...";
        document.getElementById('peer-id-input').value = "";
    }
</script>

</body>
</html>
