<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>P2P 畫面分享</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#banana{
margin-top:20px;
width:250px;
}

button{
padding:10px 20px;
margin:10px;
font-size:18px;
cursor:pointer;
}

video{
width:80%;
margin-top:20px;
border:3px solid white;
display:none;
}

#link{
color:#00ffcc;
word-break:break-all;
}

</style>
</head>

<body>

<h2>P2P 畫面分享</h2>

<img id="banana" src="https://www.iloveapps.hk/wp-content/uploads/2014/02/dancing-banana.gif">

<br>

<button onclick="startShare()">開始分享</button>

<div id="link"></div>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="leave()">退出</button>

<script>

let peer
let stream
let video=document.getElementById("video")

function getRoom(){

let params=new URLSearchParams(location.search)
return params.get("room")

}

function createPeer(id){

peer=new Peer(id,{
host:"peerjs.com",
port:443,
secure:true
})

peer.on("error",e=>{
console.log(e)
})

}

async function startShare(){

let room=getRoom()

if(!room){

room=Math.random().toString(36).substr(2,8)

location.search="?room="+room

return

}

createPeer(room)

stream=await navigator.mediaDevices.getDisplayMedia({video:true})

video.srcObject=stream
video.style.display="block"

document.getElementById("banana").style.display="none"

document.getElementById("link").innerHTML=
"分享網址:<br>"+location.href

peer.on("call",call=>{

call.answer(stream)

})

}

function join(){

let room=getRoom()

if(!room) return

createPeer()

peer.on("open",()=>{

let dummy=new MediaStream()

let call=peer.call(room,dummy)

call.on("stream",s=>{

video.srcObject=s
video.style.display="block"

document.getElementById("banana").style.display="none"

})

})

}

function leave(){

if(stream){

stream.getTracks().forEach(t=>t.stop())

}

if(peer){

peer.destroy()

}

video.srcObject=null
video.style.display="none"

document.getElementById("banana").style.display="block"

}

if(getRoom()){

join()

}

</script>

</body>
</html>
