<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerJS 畫面分享 - 最終修復版</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; text-align: center; background-color: #f9f9f9; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        img { width: 120px; margin-bottom: 15px; }
        h1 { color: #333; font-size: 24px; }
        video { width: 100%; max-height: 500px; border: 2px solid #333; border-radius: 8px; margin-top: 20px; background: #222; display: none; }
        .controls { margin: 20px 0; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 6px; transition: 0.2s; font-weight: bold; }
        #start-btn { background-color: #4A90E2; color: white; }
        #join-btn { background-color: #50E3C2; color: #333; }
        #stop-btn { background-color: #FF5A5F; color: white; margin-top: 15px; }
        button:hover { opacity: 0.85; transform: translateY(-2px); }
        input { padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 6px; width: 250px; text-align: center; }
        .id-display { font-family: monospace; padding: 10px; background: #eee; border-radius: 4px; color: #d9534f; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.iloveapps.hk/wp-content/uploads/2014/02/dancing-banana.gif" alt="Dancing Banana">
    <h1>PeerJS 畫面分享</h1>

    <div id="setup-area">
        <div class="controls">
            <button id="start-btn">分享我的網頁畫面</button>
            <p style="color: #999;">— 或者 —</p>
            <div class="btn-group">
                <input type="text" id="target-id-input" placeholder="貼上對方的代碼">
                <button id="join-btn">加入觀看</button>
            </div>
        </div>
    </div>

    <div id="active-area" class="hidden">
        <div id="id-info">
            <p id="status-text">連線準備中...</p>
            <div id="id-box" class="id-display" title="點擊複製代碼">---</div>
        </div>
        <video id="display-video" autoplay playsinline></video>
        <button id="stop-btn">退出並返回</button>
    </div>
</div>

<script>
    let peer = null;
    let localStream = null;
    let currentCall = null;

    const setupArea = document.getElementById('setup-area');
    const activeArea = document.getElementById('active-area');
    const videoElem = document.getElementById('display-video');
    const idBox = document.getElementById('id-box');
    const statusText = document.getElementById('status-text');

    // 初始化 Peer 並傳回一個 Promise
    function initPeer() {
        return new Promise((resolve, reject) => {
            if (peer && !peer.destroyed) return resolve(peer);

            peer = new Peer();

            peer.on('open', (id) => {
                console.log("我的 ID: " + id);
                idBox.innerText = id;
                resolve(peer);
            });

            peer.on('call', (call) => {
                console.log("收到連線請求");
                call.answer(localStream); // 分享者回應流
                setupCallEvents(call);
            });

            peer.on('error', (err) => {
                console.error("PeerJS 錯誤: ", err);
                alert("連線發生錯誤: " + err.type);
                resetUI();
                reject(err);
            });
        });
    }

    // 處理連線事件，防止 undefined.on 錯誤
    function setupCallEvents(call) {
        if (!call) return;
        currentCall = call;

        call.on('stream', (remoteStream) => {
            console.log("接收到畫面串流");
            activeArea.classList.remove('hidden');
            setupArea.classList.add('hidden');
            videoElem.style.display = "block";
            videoElem.srcObject = remoteStream;
        });

        call.on('close', resetUI);
        call.on('error', resetUI);
    }

    // 按鈕邏輯：分享畫面 (Host)
    document.getElementById('start-btn').addEventListener('click', async () => {
        try {
            // 1. 先抓畫面
            localStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            
            // 2. 初始化連線
            statusText.innerText = "你的分享代碼 (點擊可複製):";
            await initPeer();
            
            // 3. 更新 UI
            setupArea.classList.add('hidden');
            activeArea.classList.remove('hidden');
            videoElem.style.display = "block";
            videoElem.srcObject = localStream;
            videoElem.muted = true;

            // 監聽瀏覽器內建的停止分享
            localStream.getVideoTracks()[0].onended = resetUI;

        } catch (err) {
            console.error(err);
            alert("無法開啟螢幕分享");
        }
    });

    // 按鈕邏輯：加入觀看 (Viewer)
    document.getElementById('join-btn').addEventListener('click', async () => {
        const targetId = document.getElementById('target-id-input').value.trim();
        if (!targetId) return alert("請輸入代碼");

        try {
            statusText.innerText = "正在連線至: " + targetId;
            await initPeer();
            
            // 關鍵點：撥打給對方
            const call = peer.call(targetId, null);
            
            if (call) {
                setupCallEvents(call);
            } else {
                throw new Error("無法建立通話物件");
            }
        } catch (err) {
            alert("連線失敗，請確認代碼是否正確");
        }
    });

    // 點擊複製代碼
    idBox.addEventListener('click', () => {
        const id = idBox.innerText;
        if (id !== "---") {
            navigator.clipboard.writeText(id);
            alert("已複製代碼: " + id);
        }
    });

    // 退出功能
    document.getElementById('stop-btn').addEventListener('click', resetUI);

    function resetUI() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        if (currentCall) currentCall.close();
        if (peer) {
            peer.destroy();
            peer = null;
        }
        setupArea.classList.remove('hidden');
        activeArea.classList.add('hidden');
        videoElem.style.display = "none";
        videoElem.srcObject = null;
        idBox.innerText = "---";
        document.getElementById('target-id-input').value = "";
    }
</script>

</body>
</html>
