<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Screen Share</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>

<body>

<h2>螢幕分享測試</h2>

<button onclick="startShare()">開始分享畫面</button>

<p>分享連結：</p>
<input id="shareLink" style="width:400px">

<h3>觀看畫面</h3>
<video id="video" autoplay playsinline style="width:600px;border:1px solid black"></video>

<script>

const params = new URLSearchParams(location.search)
const room = params.get("room")

const peer = new Peer()

peer.on("open", id => {

if(!room){

const link = location.origin + location.pathname + "?room=" + id
document.getElementById("shareLink").value = link

}else{

peer.on("call", call => {
call.answer()
call.on("stream", stream => {
video.srcObject = stream
})
})

}

})

async function startShare(){

const stream = await navigator.mediaDevices.getDisplayMedia({
video:true,
audio:false
})

const call = peer.call(room || peer.id, stream)

}

</script>

</body>
</html>
